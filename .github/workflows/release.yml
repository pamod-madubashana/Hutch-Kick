name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in semver format (e.g., 1.0.0)"
            exit 1
          fi

      - name: Update version files
        run: |
          VERSION="${{ inputs.version }}"
          
          # Update VERSION file
          echo "$VERSION" > VERSION
          
          # Update package.json
          python3 -c "
          import json
          with open('package.json', 'r') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          with open('package.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "
          
          # Update tauri.conf.json
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "
          
          # Update Cargo.toml
          python3 -c "
          import re
          with open('src-tauri/Cargo.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'^version\s*=\s*\"[^\"]*\"', 'version = \"$VERSION\"', content, flags=re.MULTILINE)
          with open('src-tauri/Cargo.toml', 'w') as f:
              f.write(content)
          "
          
          echo "Updated version to $VERSION in:"
          echo "- VERSION"
          echo "- package.json"
          echo "- src-tauri/tauri.conf.json"
          echo "- src-tauri/Cargo.toml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add VERSION package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): v${{ inputs.version }}"
          git push hutch-kick main

      - name: Create release tag
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push hutch-kick "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body: |
            ## What's Changed
            <!-- Add release notes here -->
            
            ## Installation
            Download the latest release from the assets below.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
